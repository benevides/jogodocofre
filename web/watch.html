<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>O Cofre V2 — Watch</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0a0f0b; --bg-2:#0f150e; --panel:#131b12; --panel-2:#1a2418;
    --border:#233122; --border-2:#354230;
    --ink:#f0f2e9; --muted:#8a9a84;
    --accent:#7da67d; --accent-2:#c4a93d; --v2:#b8942e;
    --line:#233122; --glass:rgba(16, 23, 14, 0.88);
    --sb-width:260px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);font-family:"JetBrains Mono",monospace;height:100%;overflow:hidden;}

  /* ─── MENU LATERAL ─── */
  .sidebar {
    width: var(--sb-width);
    min-height: 100vh;
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    z-index: 100;
    padding: 28px 20px;
    font-family: "Inter", system-ui, sans-serif;
    transform: translateX(0);
    transition: transform 0.3s ease;
  }
  .sidebar.collapsed { transform: translateX(-100%); }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 40px;
    padding: 0 8px;
  }
  .brand-left { display: flex; align-items: center; gap: 12px; }
  .collapse-btn {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s;
  }
  .collapse-btn:hover { background: var(--panel-2); border-color: var(--border-2); color: var(--accent-2); }
  .brand-icon {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    display: grid;
    place-items: center;
    font-size: 1.5rem;
    box-shadow: 0 8px 24px rgba(125, 166, 125, 0.22);
  }
  .brand-text h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.3px; line-height: 1.1; }
  .brand-text span { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }

  .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .nav-menu a {
    display: flex; align-items: center; gap: 13px;
    padding: 14px 16px; border-radius: 12px;
    text-decoration: none; color: var(--muted);
    font-family: "Inter", system-ui, sans-serif;
    font-size: 0.92rem; font-weight: 500;
    transition: all 0.2s ease; border: 1px solid transparent;
    position: relative;
  }
  .nav-menu a .icon { font-size: 1.15rem; width: 28px; text-align: center; }
  .nav-menu a:hover { background: rgba(196, 169, 61, 0.08); color: var(--ink); border-color: rgba(196, 169, 61, 0.22); transform: translateX(4px); }
  .nav-menu a.active { background: linear-gradient(90deg, rgba(125, 166, 125, 0.15) 0%, rgba(196, 169, 61, 0.08) 100%); color: var(--ink); border-color: rgba(125, 166, 125, 0.4); box-shadow: 0 0 24px rgba(125, 166, 125, 0.12); }
  .nav-menu a.active::before { content: ""; position: absolute; left: 0; width: 4px; height: 28px; background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%); border-radius: 0 4px 4px 0; }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px;
    background: rgba(10, 12, 16, 0.5);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .menu-toggle {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 110;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    color: var(--ink);
    font-size: 1.3rem;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background 0.2s, opacity 0.25s, transform 0.25s;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-10px);
  }
  body:not(.sidebar-open) .menu-toggle {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .menu-toggle:hover { border-color: var(--accent-2); color: var(--accent-2); }

  /* ─── STAGE ─── */
  #stage{position:fixed;inset:0;}
  #stage canvas{width:100%!important;height:100%!important;}

  /* Ajustes quando sidebar aberta */
  body.sidebar-open #hud-top,
  body.sidebar-open #controls,
  body.sidebar-open #status-banner { left: var(--sb-width); }
  body.sidebar-open #god-panel { right: 18px; }

  /* Evita sobreposição do menu-toggle quando sidebar está recolhida */
  body:not(.sidebar-open) #hud-top { padding-left: 72px; }

  /* HUD topo */
  #hud-top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;pointer-events:none;z-index:10;transition:left 0.3s ease;}
  .hud-block{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:12px;line-height:1.9;box-shadow:0 8px 24px rgba(0,0,0,.25);}
  .hud-block .lbl{color:var(--muted);font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
  .hud-block .val{color:var(--accent);font-weight:600;}

  /* Badge V2 */
  #v2-badge{background:var(--v2);color:#111;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:4px;pointer-events:none;}

  /* Observação em baixo */
  #hud-bottom{position:fixed;bottom:0;left:0;right:0;padding:14px 18px;z-index:10;transition:left 0.3s ease;}
  body.sidebar-open #hud-bottom { left: var(--sb-width); }
  #obs-box{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-size:12.5px;line-height:1.7;max-height:90px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.25);}

  /* Botões */
  #controls{position:fixed;top:14px;right:18px;display:flex;gap:8px;z-index:11;pointer-events:all;align-items:center;justify-content:flex-end;transition:left 0.3s ease;}
  button.hbtn{font-family:inherit;font-size:11px;font-weight:600;padding:8px 14px;background:var(--glass);border:1px solid var(--line);color:var(--muted);border-radius:8px;cursor:pointer;transition:.15s;backdrop-filter:blur(10px);}
  button.hbtn:hover{border-color:var(--accent);color:var(--accent);}

  /* Status banner */
  #status-banner{position:fixed;top:54px;left:50%;transform:translateX(-50%);background:var(--glass);border:1px solid var(--line);border-radius:20px;padding:6px 18px;font-size:11px;color:var(--muted);z-index:10;backdrop-filter:blur(10px);white-space:nowrap;transition:left 0.3s ease, transform 0.3s ease;}
  #status-banner.playing{color:var(--accent);}
  body.sidebar-open #status-banner { transform: translateX(calc(-50% + var(--sb-width)/2)); }

  /* Balão de pensamento */
  #bubble{
    position:fixed;max-width:360px;width:max-content;
    background:#f5f3e8;color:#2a2a2a;border-radius:14px;
    padding:12px 16px;font-size:var(--bubble-size,15px);line-height:1.55;
    transform:translate(-50%,-100%) translateY(-12px);
    pointer-events:none;z-index:20;display:none;
    box-shadow:0 6px 24px rgba(0,0,0,.5);
  }
  #bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:10px solid transparent;border-top-color:#f5f3e8;border-bottom:none;}
  #bubble.below{transform:translate(-50%, 12px);}
  #bubble.below::after{bottom:auto;top:-10px;border-top-color:transparent;border-bottom:10px solid #f5f3e8;border-top:none;}

  /* Controle de fonte */
  #font-ctrl{display:flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--line);border-radius:8px;padding:5px 10px;backdrop-filter:blur(10px);font-size:11px;color:var(--muted);}
  #font-ctrl button{font-family:inherit;font-size:13px;font-weight:700;background:none;border:none;color:var(--muted);cursor:pointer;padding:0 4px;line-height:1;transition:.1s;}
  #font-ctrl button:hover{color:var(--accent);}
  #font-size-lbl{min-width:30px;text-align:center;color:var(--ink);}

  /* God Messages */
  #god-panel{position:fixed;bottom:100px;right:18px;width:290px;z-index:15;}
  #god-panel .gp-title{font-size:10px;letter-spacing:1px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;font-weight:600;}
  #god-panel .gp-title span{color:#d4b43a;}
  #god-input{width:100%;font-family:inherit;font-size:12px;padding:10px 12px;background:var(--glass);border:1px solid #d4b43a55;color:var(--ink);border-radius:8px 8px 0 0;resize:none;height:60px;backdrop-filter:blur(10px);}
  #god-input:focus{outline:none;border-color:#d4b43a;box-shadow:0 0 0 2px rgba(212,180,58,.15);}
  #god-send{width:100%;font-family:inherit;font-size:11px;font-weight:700;padding:9px;background:#d4b43a;color:#111;border:none;border-radius:0 0 8px 8px;cursor:pointer;letter-spacing:.5px;transition:.15s;}
  #god-send:hover{background:#e0c24a;}
  #god-send:active{transform:scale(.98);}

  @keyframes godFlash{0%{opacity:0}20%{opacity:.35}100%{opacity:0}}
  #god-flash{position:fixed;inset:0;background:radial-gradient(circle,#d4b43a44 0%,transparent 70%);pointer-events:none;z-index:50;opacity:0;}

  #win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(10,10,10,.85);backdrop-filter:blur(6px);z-index:100;}
  #win.show{display:flex;}
  #win .big{font-size:32px;font-weight:800;letter-spacing:3px;color:var(--accent);margin-bottom:14px;text-shadow:0 0 40px rgba(125,166,125,.35);}
  #win .sub{font-size:14px;color:var(--muted);}
  #win .acoes{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap;justify-content:center;}
  #win button{padding:12px 26px;font-family:inherit;font-size:13px;font-weight:600;background:var(--accent);color:#111;border:none;border-radius:9px;cursor:pointer;transition:.15s;}
  #win button:hover{filter:brightness(1.1);transform:translateY(-2px);}
  #win button.alt{background:transparent;color:var(--ink);border:1px solid var(--muted);}
  #win button.alt:hover{border-color:var(--accent);color:var(--accent);}

  /* ─── MOBILE ─── */
  @media (max-width: 900px) {
    .sidebar { width: 280px; }
    body.sidebar-open #hud-top,
    body.sidebar-open #controls,
    body.sidebar-open #hud-bottom,
    body.sidebar-open #status-banner { left: 0; }
    body.sidebar-open #status-banner { transform: translateX(-50%); }
    #hud-top { padding-top: 76px; }
    #controls { top: 76px; }
    #status-banner { top: 116px; }
  }
  @media (max-width: 520px) {
    #god-panel { width: calc(100% - 36px); }
    #controls { left: 14px !important; right: 14px; top: 72px; flex-wrap: wrap; }
    #hud-top { padding-top: 116px; }
    #status-banner { top: 156px; }
  }
</style>
</head>
<body class="sidebar-open">

<button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">☰</button>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="brand-left">
      <div class="brand-icon">🔐</div>
      <div class="brand-text">
        <h1>O Cofre</h1>
        <span>Escape Room IA</span>
      </div>
    </div>
    <button class="collapse-btn" id="collapse-btn" aria-label="Recolher menu">◀</button>
  </div>
  <nav>
    <ul class="nav-menu">
      <li><a href="/"><span class="icon">🏠</span> Início</a></li>
      <li><a href="/watch" class="active"><span class="icon">🎮</span> Assistir</a></li>
      <li><a href="/analise"><span class="icon">📊</span> Análises</a></li>
      <li><a href="/configurar"><span class="icon">🔌</span> Configurar</a></li>
    </ul>
  </nav>
  <div class="sidebar-footer">
    Use <code>python src/agente.py</code> para iniciar uma partida.
  </div>
</aside>

<div id="stage"></div>

<div id="hud-top">
  <div class="hud-block">
    <div class="lbl">Local</div><div class="val" id="h-room">-</div>
    <div class="lbl">Inventário</div><div class="val" id="h-inv">-</div>
    <div class="lbl">God Messages</div><div class="val" id="h-god">0 ⚡</div>
  </div>
</div>

<div id="controls">
  <span id="v2-badge">V2 · EXPLORAÇÃO</span>
  <div id="font-ctrl">
    <span>💬</span>
    <button id="font-down">−</button>
    <span id="font-size-lbl">15px</span>
    <button id="font-up">+</button>
  </div>
  <button class="hbtn" id="btn-reset">↻ reset</button>
</div>

<div id="status-banner">⏳ aguardando a IA começar...</div>

<div id="bubble"></div>

<div id="hud-bottom">
  <div style="display:flex;gap:14px;align-items:center;margin-bottom:10px;">
    <span style="font-size:12px;color:var(--muted)">passos: <b id="h-steps" style="color:var(--ink)">-</b></span>
    <span style="font-size:12px;color:var(--muted)">score: <b id="h-score" style="color:var(--accent)">-</b></span>
  </div>

</div>

<div id="god-flash"></div>

<div id="god-panel">
  <div class="gp-title">
    <span>⚡ GOD MESSAGES</span>
    <span id="god-count">0 enviadas</span>
  </div>

</div>

<div id="win">
  <div class="big">IA VENCEU 🎉</div>
  <div class="sub" id="win-txt">...</div>
  <div class="acoes">
    <button id="win-reset">🔄 jogar novamente</button>
    <button id="win-analise" class="alt">📊 ver análise</button>
    <button id="win-home" class="alt">🏠 página principal</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){

// ─── MENU LATERAL ────────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const menuToggle = document.getElementById('menu-toggle');
const collapseBtn = document.getElementById('collapse-btn');

function updateSidebar(){
  const open = document.body.classList.contains('sidebar-open');
  sidebar.classList.toggle('collapsed', !open);
  menuToggle.setAttribute('aria-expanded', open);
  collapseBtn.setAttribute('aria-expanded', open);
  collapseBtn.textContent = open ? '◀' : '▶';
  localStorage.setItem('cofre-sidebar', open ? 'open' : 'closed');
}
function openSidebar(){ document.body.classList.add('sidebar-open'); updateSidebar(); }
function closeSidebar(){ document.body.classList.remove('sidebar-open'); updateSidebar(); }

menuToggle.addEventListener('click', openSidebar);
collapseBtn.addEventListener('click', closeSidebar);

if(localStorage.getItem('cofre-sidebar') === 'closed'){
  document.body.classList.remove('sidebar-open');
}
updateSidebar();

// Usa a origem da página quando servido pelo server.py; fallback p/ file://
const SERVER   = location.protocol.startsWith('http') ? location.origin
                                                       : 'http://localhost:5002';
const ROOM_POS = {sala:[0,0], cozinha:[-9.5,0], quarto:[0,-9.5], escritorio:[9.5,0]};

// ── RENDERER ────────────────────────────────────────────────────────────────
const stage  = document.getElementById('stage');
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x141a13);
scene.fog        = new THREE.Fog(0x141a13, 25, 62);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 18, 22);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
stage.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, -3);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance   = 5;
controls.maxDistance   = 55;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// ── LIGHTS ──────────────────────────────────────────────────────────────────
const hemi = new THREE.HemisphereLight(0xffffff, 0x40434d, 1.0);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(8,18,6); sun.castShadow = true;
scene.add(sun);

// ── HELPERS ─────────────────────────────────────────────────────────────────
function box(w,h,d,col,recv){
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color:col, roughness:.85})
  );
  if(recv) m.receiveShadow = true;
  return m;
}
function add(m){ scene.add(m); return m; }
function floor(cx,cz,s,col){ const f=box(s,.1,s,col,true); f.position.set(cx,-.05,cz); return add(f); }
function strip(x,z,w,d){ const f=box(w,.07,d,0x3a3d45,true); f.position.set(x,-.04,z); add(f); }
function wall(cx,cz,w,d){ const m=box(w,1.4,d,0x53575f); m.position.set(cx,.7,cz); add(m); }
function room(cx,cz,s,col,skip){
  floor(cx,cz,s,col); const h=s/2;
  if(skip!=='N') wall(cx,cz-h,s,.2);
  if(skip!=='S') wall(cx,cz+h,s,.2);
  if(skip!=='E') wall(cx+h,cz,.2,s);
  if(skip!=='W') wall(cx-h,cz,.2,s);
}
function hl(m){ m.material.emissive=new THREE.Color(0x5a8a5a); m.material.emissiveIntensity=.45; }
function unhl(m){ m.material.emissive=new THREE.Color(0); m.material.emissiveIntensity=0; }

// ── ROOMS ────────────────────────────────────────────────────────────────────
room( 0,    0,   7, 0x6b6f78, 'X');
room(-9.5,  0,   6, 0x4a5a52, 'E');
room( 0,  -9.5,  6, 0x5a4a5a, 'S');
room( 9.5,  0,   6, 0x5a554a, 'W');
strip(-6.2, 0, 3.4, 2);
strip(0, -6.2, 2, 3.4);
strip(6.2, 0, 3.4, 2);

// ── OBJETOS PRINCIPAIS (iguais ao V1) ────────────────────────────────────────

// Sala
const table   = add(box(1.6,.6,.9,  0x8a6a4a)); table.position.set(0,.3,-2.7);
const note    = add(box(.4,.05,.3,  0xf2efe0)); note.position.set(0,.63,-2.7);

// Sala — red herring: quadro_antigo na parede oeste
const oldPainting = add(box(1.0,.7,.05, 0x7a6a4a)); oldPainting.position.set(-3.3,1.0,0);

// Cozinha
const cabinet = add(box(1.4,1.6,.7, 0x6f5a3a)); cabinet.position.set(-9.5,.8,-2.6);
const cabDoor = add(box(1.36,1.5,.06,0x7a653f)); cabDoor.position.set(-9.5,.8,-2.24);

// Cozinha — red herrings
const shelf = add(box(1.2,.08,.25, 0x9a7a5a)); shelf.position.set(-12.0,.9, 0);
const fogao = add(box(1.0,.7,.7,   0x5a5a62)); fogao.position.set(-9.5,.35, 2.4);

// Quarto
const dresser = add(box(1.6,1.0,.8, 0x7a5a6a)); dresser.position.set(0,.5,-11.6);
const dreDraw = add(box(1.4,.4,.1,  0x8a6a7a)); dreDraw.position.set(0,.55,-11.18);

// Quarto — red herrings: cama e guarda-roupa
const bed      = add(box(2.0,.35,1.2, 0x8a7a9a)); bed.position.set(2.0,.18,-9.5);
const pillow   = add(box(.8,.12,.5,   0xf0ede8)); pillow.position.set(2.0,.42,-10.0);
const wardrobe = add(box(1.2,1.8,.5,  0x5a4a3a)); wardrobe.position.set(-2.6,.9,-9.5);

// Escritório
const safe     = add(box(1.2,1.2,1.0,0x9aa0a8)); safe.position.set(9.5,.6,-2.4);
const safeDoor = add(box(1.1,1.1,.08,0xb0b6be)); safeDoor.position.set(9.5,.6,-1.88);
const painting = add(box(1.2,.9,.06, 0xcaa05a)); painting.position.set(12.3,1.0,0);
const lockDraw = add(box(1.4,1.0,.8, 0x6a5a4a)); lockDraw.position.set(9.5,.5,2.6);
const lockFace = add(box(1.3,.9,.08, 0x7a6a4f)); lockFace.position.set(9.5,.5,2.18);

// Escritório — red herrings: escrivaninha e livro
const desk = add(box(1.6,.75,.7, 0x7a6a4a)); desk.position.set(7.3,.38, 0);
const book = add(box(.25,.35,.18,0x4a3a5a)); book.position.set(7.3,.76,.1);

// Chave (invisível até ser pega)
const key = new THREE.Mesh(
  new THREE.BoxGeometry(.18,.18,.18),
  new THREE.MeshStandardMaterial({color:0xefc23a, emissive:0x6a5400, emissiveIntensity:.6})
);
key.visible = false;
scene.add(key);

// ── AGENTE ───────────────────────────────────────────────────────────────────
const agent  = new THREE.Group();
const agBody = new THREE.Mesh(
  new THREE.CylinderGeometry(.34,.34,1.0,18),
  new THREE.MeshStandardMaterial({color:0x5a7a5a, roughness:.5})
);
agBody.position.y = .5;
const agHead = new THREE.Mesh(
  new THREE.SphereGeometry(.3,18,18),
  new THREE.MeshStandardMaterial({color:0x8faf8f, roughness:.5})
);
agHead.position.y = 1.15;
agent.add(agBody); agent.add(agHead);
agent.position.set(0,0,0);
scene.add(agent);

// ── BALÃO DE PENSAMENTO ──────────────────────────────────────────────────────
const bubble  = document.getElementById('bubble');
const bubbleV = new THREE.Vector3();
let   currentThought = '';

const FONT_MIN = 11, FONT_MAX = 24;
let bubbleFontSize = parseInt(localStorage.getItem('bubbleFontSize') || '15');
function applyFontSize(){
  document.documentElement.style.setProperty('--bubble-size', bubbleFontSize + 'px');
  document.getElementById('font-size-lbl').textContent = bubbleFontSize + 'px';
}
applyFontSize();
document.getElementById('font-up').onclick   = ()=>{ bubbleFontSize=Math.min(FONT_MAX,bubbleFontSize+1); applyFontSize(); localStorage.setItem('bubbleFontSize',bubbleFontSize); };
document.getElementById('font-down').onclick = ()=>{ bubbleFontSize=Math.max(FONT_MIN,bubbleFontSize-1); applyFontSize(); localStorage.setItem('bubbleFontSize',bubbleFontSize); };

function updateBubble(){
  if(!currentThought){ bubble.style.display='none'; return; }
  agent.getWorldPosition(bubbleV);
  bubbleV.y += 2.2;
  const proj = bubbleV.project(camera);
  const x = ( proj.x*.5+.5)*innerWidth;
  const y = (-proj.y*.5+.5)*innerHeight;
  if(proj.z>1){ bubble.style.display='none'; return; }
  bubble.textContent = currentThought;
  bubble.style.display = 'block';
  bubble.style.left = x + 'px';
  const bh = bubble.offsetHeight||80;
  if(y-bh-16<0){
    bubble.classList.add('below'); bubble.style.top=y+'px';
  } else {
    bubble.classList.remove('below'); bubble.style.top=y+'px';
  }
}

// ── ANIMAÇÃO ─────────────────────────────────────────────────────────────────
let animTarget = null;
function animateTo(room){
  const p = ROOM_POS[room];
  if(p) animTarget = new THREE.Vector3(p[0],0,p[1]);
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
(function loop(){
  requestAnimationFrame(loop);
  controls.update();
  if(animTarget){
    agent.position.lerp(animTarget,.07);
    if(agent.position.distanceTo(animTarget)<.2) animTarget=null;
  }
  if(key.visible){
    key.position.set(agent.position.x, 1.7, agent.position.z);
    key.rotation.y += .03;
  }
  updateBubble();
  renderer.render(scene, camera);
})();

// ── POLLING ───────────────────────────────────────────────────────────────────
let lastRoom='', gameRunning=false;

async function poll(){
  try{
    const res = await fetch(SERVER+'/current-game');
    const s   = await res.json();
    const banner = document.getElementById('status-banner');

    if(s.status==='playing' && s.room){
      if(!gameRunning){ gameRunning=true; banner.className='playing'; banner.textContent='▶ IA explorando (V2)...'; }

      if(s.room !== lastRoom){ animateTo(s.room); lastRoom=s.room; }

      if(s.thought && s.thought !== currentThought){
        currentThought = s.thought;
        clearTimeout(bubble._timer);
        bubble._timer = setTimeout(()=>{ currentThought=''; bubble.style.display='none'; }, 6000);
      }

      // Infere estado dos objetos a partir de valid_actions (que o watch ainda recebe)
      const va = (s.valid_actions||[]).join(' ');

      // Armário da cozinha
      if(!va.includes('abrir armario')){
        cabDoor.rotation.y=-0.9; cabDoor.position.x=-10.05; cabDoor.position.z=-2.0;
        hl(cabinet);
      }

      // Chave
      if(s.inventory && s.inventory.includes('chave')){
        key.visible=true;
        hl(dresser);
        dreDraw.position.z=-10.9;
      }

      // Quadro do escritório examinado (pintado de highlight quando agente está no escritório e já examinou)
      // Usamos: se NOT in valid_actions E agente está no escritório → já examinou
      if(s.room==='escritorio' && !va.includes('examinar quadro')){ hl(painting); }

      // Gaveta trancada do escritório (destrancada quando "usar chave em gaveta" some da lista
      // e a gaveta no escritório pode ser aberta — "abrir gaveta" aparece no escritório)
      if(s.room==='escritorio' && va.includes('abrir gaveta')){ lockFace.position.z=2.55; hl(lockDraw); }

      // Vitória
      if(s.terminated){
        safeDoor.rotation.y=-1.1; safeDoor.position.x=8.95; safeDoor.position.z=-1.45;
        safe.material.color=new THREE.Color(0x5a8a5a);
        currentThought='';
        document.getElementById('win').classList.add('show');
        document.getElementById('win-txt').textContent =
          'passos: '+s.steps+' · score: '+s.score+' · god messages: '+(s.god_message_count||0)+' ⚡';
      }

      // HUD
      document.getElementById('h-room').textContent  = s.room_name||'-';
      document.getElementById('h-inv').textContent   = s.inventory&&s.inventory.length ? s.inventory.join(', ') : '-';
      document.getElementById('h-god').textContent   = (s.god_message_count||0)+' ⚡';
      document.getElementById('god-count').textContent = (s.god_message_count||0)+' enviada'+(s.god_message_count!==1?'s':'');
      document.getElementById('h-steps').textContent = s.steps;
      document.getElementById('h-score').textContent = (s.score>=0?'+':'')+s.score;
      document.getElementById('obs-box').textContent = s.obs||'';

    } else if(s.status==='waiting'){
      if(gameRunning){ gameRunning=false; banner.className=''; banner.textContent='⏳ aguardando a IA começar...'; }
    }
  } catch(e){
    document.getElementById('status-banner').textContent='❌ sem conexão com o servidor ('+SERVER+')';
  }
}
setInterval(poll, 500);
poll();

// ── GOD MESSAGES ──────────────────────────────────────────────────────────────
const godFlash = document.getElementById('god-flash');

async function sendGodMessage(){
  const input = document.getElementById('god-input');
  const msg   = input.value.trim();
  if(!msg) return;
  try{
    const r    = await fetch(SERVER+'/god-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data = await r.json();
    input.value = '';
    godFlash.style.animation='none';
    godFlash.offsetHeight;
    godFlash.style.animation='godFlash 1.2s ease-out forwards';
    const n = data.count;
    document.getElementById('god-count').textContent  = n+' enviada'+(n!==1?'s':'');
    document.getElementById('h-god').textContent      = n+' ⚡';
    document.getElementById('god-send').textContent   = '⚡ ENVIADO! ('+n+')';
    setTimeout(()=>{ document.getElementById('god-send').textContent='⚡ ENVIAR MENSAGEM DIVINA'; },2000);
  } catch(e){
    alert('Erro ao enviar: '+e.message);
  }
}
document.getElementById('god-send').onclick = sendGodMessage;
document.getElementById('god-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendGodMessage(); }
});

// ── RESET ─────────────────────────────────────────────────────────────────────
async function doReset(){
  await fetch(SERVER+'/reset');
  await fetch(SERVER+'/thought',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({thought:''})}).catch(()=>{});

  // Reseta portas e posições
  cabDoor.rotation.y=0;   cabDoor.position.set(-9.5,.8,-2.24);
  dreDraw.position.set(0,.55,-11.18);
  safeDoor.rotation.y=0;  safeDoor.position.set(9.5,.6,-1.88);
  safe.material.color=new THREE.Color(0x9aa0a8);
  lockFace.position.set(9.5,.5,2.18);

  // Remove highlights
  [note,cabinet,dresser,painting,lockDraw,oldPainting].forEach(unhl);

  key.visible=false;
  agent.position.set(0,0,0);
  lastRoom=''; gameRunning=false; currentThought='';
  clearTimeout(bubble._timer);
  bubble.style.display='none'; bubble.textContent='';

  document.getElementById('win').classList.remove('show');
  document.getElementById('obs-box').textContent='partida reiniciada — aguardando IA...';
  document.getElementById('status-banner').className='';
  document.getElementById('status-banner').textContent='⏳ aguardando a IA começar...';
}
document.getElementById('btn-reset').onclick  = doReset;
document.getElementById('win-reset').onclick  = doReset;
// SERVER cobre tanto a página servida pelo server.py quanto aberta via file://
document.getElementById('win-analise').onclick = ()=>{ location.href = SERVER + '/analise'; };
document.getElementById('win-home').onclick    = ()=>{ location.href = SERVER + '/'; };

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

})();
</script>
